<!DOCTYPE html>
<html lang="it">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RN4LEG6EJ5"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-RN4LEG6EJ5');
    </script>

    <!-- Script -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Fantamorto Cup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <link rel="icon" type="image/svg+xml" href="logo_fantamorto.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <datalist id="lista-suggerimenti"></datalist>
    <header>
        <h1 style="text-align: center;">☠️ Fantamorto Cup 2026</h1>
        <nav id="main-nav">
            <button id="btn-rank" class="active" onclick="switchView('rank')">🏆 Classifica</button>
            <button id="btn-teams"  onclick="switchView('teams')">👪 Squadre</button>
            <button id="btn-mercato" onclick="switchView('mercato')">⚙️ Gestione Squadra</button>
            <button id="btn-admin" onclick="switchView('admin')">🔧 Gestione Admin</button>
        </nav>
    </header>

    <div id="view-rank" class="view active">
        <div id="rank-container"></div>
    </div>

    <div id="view-teams" class="view">
        <div id="teams-container"></div>
    </div>

    <div id="view-mercato" class="view">
        <div class="card" style="border-top: 4px solid #44aaff;">
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px; width: 100%; margin-bottom: 20px;">
                <select id="user-team-select" onchange="render()" style="margin: 0; min-width: 0;"><option value="">-- Seleziona Squadra --</option></select>
                <div id="mercato-morituri-display" style="flex-shrink: 0; text-align: right; white-space: nowrap;"></div>
                <div id="mercato-budget-display" style="flex-shrink: 0; text-align: right; white-space: nowrap;"></div>
            </div>
            <div id="mercato-editor"></div>
        </div>
        <div style="text-align:center;">
            <button onclick="saveToGitHub('admin')">💾 Salva sul sito</button>
        </div>
    </div>

    <div id="view-admin" class="view">
        <div id="admin-container"></div>
        <div style="text-align:center;">
            <button onclick="saveToGitHub('admin')">💾 Salva sul sito</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="utils.js"></script>

    <script src="classifica.js"></script>
    <script src="squadre.js"></script>
    <script src="admin.js"></script>
    <script src="mercato.js"></script>
</body>
</html>

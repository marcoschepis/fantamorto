<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Fantamorto Cup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <link rel="icon" type="image/svg+xml" href="logo_fantamorto.svg">
    <style>
        :root { --background-body: #121212; --card-bg: #1e1e1e; --accent: #ff4444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Menu Navigazione */
        nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        nav button { background: transparent; border: 1px solid #444; color: #777; cursor: pointer; padding: 10px 20px; transition: 0.3s; }
        nav button.active { border-color: var(--accent); color: var(--accent); background: #251010; font-weight: bold; }
        #btn-admin { display: none; } /* Nascosto di default */

        .view { display: none; }
        .view.active { display: block; }

        /* Card e Tabelle */
        .card { background: var(--card-bg); border: 1px solid #333; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        #rank-container { display: grid; grid-template-columns: 1fr; }
        .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .rank-punti { color: #fff; font-weight: bold; font-size: 1.5rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #2a2a2a; }
        
        /* Allineamenti Classifica */
        .col-nome { text-align: left; width: 70%; }
        .col-punti { text-align: right; width: 30%; font-weight: bold; color: #fff; }
        .dead-text { color: #fff; }

        /* Allineamenti Admin */
        .admin-header { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #333; }
        .admin-squad-info { display: flex; align-items: center; gap: 5px; }
        .admin-input-header { background: #111; border: 1px solid #444; color: #fff; padding: 6px 8px; font-size: 0.9rem; border-radius: 4px; font-weight: 500; }
        .admin-input-header:focus { outline: none; border-color: var(--accent); background: #1a1a1a; }
        .admin-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .admin-table input { width: 100%; box-sizing: border-box; background: #111; border: 1px solid #444; color: #fff; padding: 6px 4px; font-size: 0.85rem; }
        .admin-table input:focus { outline: none; border-color: var(--accent); background: #1a1a1a; }
        .admin-table th { background: #0a0a0a; color: #888; font-weight: bold; font-size: 0.8rem; padding: 8px 4px; text-align: center; border: 1px solid #333; }
        .admin-table th:first-child { text-align: left; }
        .admin-table td { padding: 6px 4px; border: 1px solid #2a2a2a; vertical-align: middle; text-align: center; font-size: 0.85rem; }
        .admin-table td:first-child { text-align: left; padding-left: 6px; }
        .admin-table button { background: #333; border: 1px solid #555; color: #fff; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; transition: 0.2s; }
        .admin-table button:hover { background: var(--accent); border-color: var(--accent); }
        .admin-row-dead { background: #1a0a0a; }
        .admin-row-dead input { background: #0a0505; }

        textarea { width: 100%; height: 120px; font-family: 'Courier New', monospace; background: #000; color: #0f0; border: 1px solid #444; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1 style="text-align: center;">☠️ Fantamorto Cup 2026</h1>
        <nav id="main-nav">
            <button id="btn-rank" class="active" onclick="switchView('rank')">🏆 Classifica</button>
            <button id="btn-teams"  onclick="switchView('teams')">👪 Squadre</button>
            <button id="btn-mercato" onclick="switchView('mercato')">⚙️ Gestione Squadra</button>
            <button id="btn-admin" onclick="switchView('admin')">🔧 Gestione Admin</button>
        </nav>
    </header>

    <div id="view-rank" class="view active">
        <div id="rank-container"></div>
    </div>

    <div id="view-teams" class="view">
        <div id="teams-container"></div>
    </div>

    <div id="view-mercato" class="view">
        <datalist id="lista-suggerimenti"></datalist>
        <div class="card" style="border-top: 4px solid #44aaff;">
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px; width: 100%; margin-bottom: 20px;">
                <select id="user-team-select" onchange="render()" style="margin: 0; min-width: 0;"><option value="">-- Seleziona Squadra --</option></select>
                <div id="mercato-morituri-display" style="flex-shrink: 0; text-align: right; white-space: nowrap;"></div>
                <div id="mercato-budget-display" style="flex-shrink: 0; text-align: right; white-space: nowrap;"></div>
            </div>
            <div id="mercato-editor"></div>
        </div>
        <div style="text-align:center;">
            <button onclick="saveToGitHub('admin')">💾 Salva sul sito</button>
        </div>
    </div>

    <div id="view-admin" class="view">
        <div id="admin-container"></div>
        <div style="text-align:center;">
            <button onclick="saveToGitHub('admin')">💾 Salva sul sito</button>
        </div>
    </div>

    <script>
        let db = { config: { crediti_iniziali: 330 }, campionato: [] };
        
        // Configurazione GitHub (modificare con i tuoi dati)
        const REPO_INFO = {
            OWNER: 'marcoschepis',
            REPO: 'fantamorto',
            PATH: 'squadre.json',
            MORITURI: 'morituri.json'
        };
        
        // Hash della password
        const SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";
        let isAuthorized = false;

        async function verifyAdmin() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('admin');
            if (!key) return;

            const msg = new TextEncoder().encode(key);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msg);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashedKey = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashedKey === SECRET_HASH) {
                isAuthorized = true;
                document.getElementById('btn-admin').style.display = 'block';
            }
        }

        function loadData() {
            fetch(REPO_INFO.PATH + '?' + new Date().getTime())
                .then(r => r.json())
                .then(data => {
                    db = data;
                    return fetch(REPO_INFO.MORITURI + '?' + new Date().getTime());
                })
                .then(r => r.json())
                .then(lista => {
                    catalogoMorituri = lista;
                    
                    // AGGIUNGI QUESTE RIGHE QUI:
                    const dl = document.getElementById('lista-suggerimenti');
                    if (dl) {
                        dl.innerHTML = catalogoMorituri.map(m => `<option value="${m.nome}">`).join('');
                    }
                    
                    render();
                })
                .catch(e => console.error("Errore caricamento dati:", e));
        }

        function switchView(name) {
            if (name === 'admin' && !isAuthorized) return;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            render();
        }

        function updateValue(tIdx, pIdx, field, val) {
            db.campionato[tIdx].partecipanti[pIdx][field] = (field === 'nome') ? val : parseInt(val) || 0;
            render();
        }

        function updateMortoStatus(idx) {
            db.morituri[idx].status = db.morituri[idx].status === 'vivo' ? 'morto' : 'vivo';
            render();
        }

        function updateMortoPoints(idx, points) {
            db.morituri[idx].punti = parseInt(points) || 0;
            render();
        }

        function updateMortoPrezzo(idx, prezzo) {
            db.morituri[idx].prezzo = parseInt(prezzo) || 0;
            render();
        }

        function updateMortoRimborso(idx, val) {
            db.morituri[idx].rimborso = parseInt(val) || 0;
            render();
        }

        function getMortoByName(nome) {
            return db.morituri.find(m => m.nome === nome);
        }

        function removeMorto(idx) {
            if (confirm('Rimuovere ' + db.morituri[idx].nome + '?')) {
                db.morituri.splice(idx, 1);
                render();
            }
        }

        function addMorto() {
            const nome = document.getElementById('new-morto-nome').value.trim();
            
            if (!nome) { alert('Inserisci un nome'); return; }

            const prezzo = parseInt(document.getElementById('new-morto-prezzo').value) || 0;

            if (db.morituri.find(m => m.nome === nome)) { alert('Morto già esistente'); return; }

            const infoDalCatalogo = catalogoMorituri.find(m => m.nome.toLowerCase() === nome.toLowerCase());

            if (infoDalCatalogo) {
                db.morituri.push({
                    nome: infoDalCatalogo.nome,
                    prezzo: infoDalCatalogo.prezzo,
                    status: 'vivo',
                    punti: 0,
                    rimborso: 0
                });
                console.log(`Recuperato ${infoDalCatalogo.nome} dal catalogo.`);
            } else {
                // Se NON lo trova (magari è un nome personalizzato/fuori listino),
                // usa il prezzo inserito manualmente nell'input
                const prezzoManuale = parseInt(document.getElementById('new-morto-prezzo').value) || 0;
                
                db.morituri.push({
                    nome: nomeInput,
                    prezzo: prezzoManuale,
                    nascita: "",
                    descrizione: "Inserimento manuale",
                    status: 'vivo',
                    punti: 0,
                    rimborso: 0
                });
                console.log(`Personaggio non in catalogo. Aggiunto manualmente.`);
            }

            // Reset campi e aggiornamento vista
            document.getElementById('new-morto-nome').value = '';
            document.getElementById('new-morto-prezzo').value = '0';
            render();
        }

        function addSquadra() {
            db.campionato.push({
                nome_squadra: "Nuova Squadra",
                proprietario: "Proprietario",
                partecipanti: [],
                totPunti: 0
            });
            render();
        }
        function removeSquadra(idx) {
            const nome = db.campionato[idx].nome_squadra;
            if (confirm(`Sei sicuro di voler eliminare definitivamente la squadra "${nome}"?`)) {
                db.campionato.splice(idx, 1);
                render();
            }
        }

        function calculateCreditiSquadra(squadra) {
            return squadra.partecipanti.reduce((acc, p) => {
                const morto = getMortoByName(p.nome);
                const costo = morto ? morto.prezzo : 0;
                let rimborso = 0;
                if (morto && morto.status === 'morto') {
                    rimborso = (morto.rimborso || 0);
                }
                else {
                    rimborso = 0;
                }

                return acc + costo - rimborso;
            }, 0);
        }

        function calculateCreditiInizialiSquadra(squadra) {
            return squadra.partecipanti.reduce((acc, p) => {
                const morto = getMortoByName(p.nome);
                const costo = morto ? morto.prezzo : 0;

                return acc + costo;
            }, 0);
        }

        function calculateRimborsoCreditiSquadra(squadra) {
            return squadra.partecipanti.reduce((acc, p) => {
                const morto = getMortoByName(p.nome);
                let rimborso = 0;
                if (morto && morto.status === 'morto') {
                    rimborso = (morto.rimborso || 0);
                }
                else {
                    rimborso = 0;
                }

                return acc + rimborso;
            }, 0);
        }

        function calculateCreditiResidui(squadra) {
            const spesa = calculateCreditiSquadra(squadra);
            return (db.config.crediti_iniziali || 330) - spesa;
        }

        function aggiornaPrezzoAutomatico(nomeInserito, inputElement) {
            const prezzoInput = document.getElementById(inputElement);
            
            // Cerchiamo nel catalogo se il nome inserito corrisponde esattamente a uno esistente
            const trovato = catalogoMorituri.find(m => m.nome.toLowerCase() === nomeInserito.toLowerCase());
            
            if (trovato) {
                // Se lo trova, aggiorna la casella del prezzo con il valore ufficiale
                prezzoInput.value = trovato.prezzo;
                prezzoInput.style.borderColor = "#44ff44";
            } else {
                // Se non lo trova (sta ancora scrivendo o è un nome nuovo), resetta
                prezzoInput.value = '?';
                prezzoInput.style.borderColor = "#444";
            }
        }

        function numeroMaxPartecipanti(squadra) {
            const conteggioMorti = squadra.partecipanti.filter(p => {
                const m = getMortoByName(p.nome);
                return m && m.status === 'morto';
            }).length;
            return 13 + conteggioMorti;
        }

        function aggiungiADb(tIdx, fonteInputId) {
            const inputElement = document.getElementById(fonteInputId);
            const nomeSelezionato = inputElement.value.trim();
            
            if (!nomeSelezionato || nomeSelezionato.startsWith("--")) {
                alert("Seleziona o inserisci un nome valido.");
                return;
            }

            const squadra = db.campionato[tIdx];
            // Cerchiamo le info nel catalogo generale (morituri.json)
            const infoMorituro = catalogoMorituri.find(m => m.nome.toLowerCase() === nomeSelezionato.toLowerCase());

            if (!infoMorituro) {
                alert("Errore: Il personaggio non è presente nel listino ufficiale.");
                return;
            }

            // --- CONTROLLO 1: Già in squadra ---
            if (squadra.partecipanti.find(p => p.nome.toLowerCase() === infoMorituro.nome.toLowerCase())) {
                alert(`⚠️ ${infoMorituro.nome} è già presente in questa squadra.`);
                return;
            }

            // --- CONTROLLO 2: Limite 13 partecipanti ---
            const conteggioMorti = squadra.partecipanti.filter(p => {
                const m = getMortoByName(p.nome);
                return m && m.status === 'morto';
            }).length;
            if (squadra.partecipanti.length >= numeroMaxPartecipanti(squadra)) {
                alert(`⚠️ Limite raggiunto! ${squadra.nome_squadra} ha raggiunto il limite di morituri.`);
                return;
            }

            // --- CONTROLLO 3: Budget ---
            const costo = infoMorituro.prezzo;
            const residui = calculateCreditiResidui(squadra);
            if (costo > residui) {
                alert(`💰 Budget insufficiente!\n${infoMorituro.nome} costa ${costo} BS, ma ne hai solo ${residui} residui.`);
                return;
            }

            // --- ESECUZIONE ---
            // 1. Se il morto non esiste ancora nel DB globale dei punteggi, lo aggiungiamo come 'vivo'
            if (!getMortoByName(infoMorituro.nome)) {
                db.morituri.push({
                    nome: infoMorituro.nome,
                    prezzo: infoMorituro.prezzo,
                    status: 'vivo',
                    punti: 0,
                    rimborso: 0
                });
            }

            // 2. Aggiungiamo il partecipante alla squadra
            squadra.partecipanti.push({ nome: infoMorituro.nome });
            
            // Reset input (se è un text input)
            if (inputElement.tagName === "INPUT") inputElement.value = "";
            
            render();
        }

        function render() {
            const rankCont = document.getElementById('rank-container');
            const teamsCont = document.getElementById('teams-container');
            const adminCont = document.getElementById('admin-container');
            rankCont.innerHTML = '';
            teamsCont.innerHTML = '';
            adminCont.innerHTML = '';

            // Calcoli totali per squadra
            db.campionato.forEach(s => {
                s.totPunti = s.partecipanti.reduce((acc, p) => {
                    const morto = getMortoByName(p.nome);
                    return acc + (morto ? morto.punti : 0);
                }, 0);
            });

            const sortedTeams = [...db.campionato].sort((a, b) => b.totPunti - a.totPunti);

            // --- Vista Classifica ---
            rankCont.innerHTML += `
                <div style="display: flex; padding: 0 20px 10px 20px; font-size: 0.75rem; color: #666; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">
                    <div style="flex: 0 0 40px;">Pos</div>
                    <div style="flex: 1; text-align: left;">Squadra</div>
                    <div style="text-align: right;">Punti</div>
                </div>
            `;
            rankCont.innerHTML += sortedTeams.map((s, index) => {
                const posizione = index + 1;
                let icona = posizione;
                if (posizione === 1) icona = '🥇';
                else if (posizione === 2) icona = '🥈';
                else if (posizione === 3) icona = '🥉';

                const podioColor = posizione === 1 ? '#FFD700' : // Oro
                   posizione === 2 ? '#C0C0C0' : // Argento
                   posizione === 3 ? '#CD7F32' : // Bronzo
                   '#333';                       // Grigio scuro per gli altri

                return `
                    <div class="team-card" style="display: flex; align-items: center; padding: 15px; margin-bottom: 12px; border-left: 4px solid ${podioColor};">
                        <div style="flex: 0 0 40px; font-size: 1.2rem; font-weight: bold; color: ${podioColor};">
                            ${icona}
                        </div>
                        <div style="flex: 1; text-align: left;">
                            <div style="flex: 1; align-items: center; gap: 5px;">
                                <div style="font-size: 1.1rem; font-weight: bold; color: #fff; line-height: 1.2;">
                                    ${s.nome_squadra}
                                </div>
                            </div>
                            <div style="font-size: 0.85rem; color: #888">
                                ${s.proprietario}
                            </div>
                        </div>
                        <div style="text-align: right; font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1;">
                            ${s.totPunti}
                        </div>
                    </div>
                `;
            }).join('');

            // --- Vista Squadre ---
            sortedTeams.forEach((s) => {
                const tIdx = db.campionato.indexOf(s);

                teamsCont.innerHTML += `
                    <div class="card">
                        <div class="team-header" style="display: flex; align-items: flex-end; padding-bottom: 15px; margin-bottom: 10px;">
                            <div style="flex: 0 0 40%; text-align: left;">
                                <div style="display: flex; align-items: center; gap: 5px;">
                                    <span style="font-size: 1.2rem; font-weight: bold; color: #fff;">${s.nome_squadra}</span>
                                </div>
                                <div style="font-size: 0.85rem; color: #888;">${s.proprietario} - Crediti disponibili: ${calculateCreditiResidui(s)}</div>
                            </div>

                            <div style="flex: 0 0 20%; text-align: center;">
                                <div style="color: #888; font-size: 0.75rem; text-align: center; ">Bossetti utilizzati</div>
                                <div style="color: #fff; font-weight: bold;">
                                    ${calculateCreditiInizialiSquadra(s)}
                                    <span style="font-weight: normal; color: #fff; font-size: 0.8em;"> / ${db.config.crediti_iniziali || 330}</span>
                                </div>
                            </div>

                            <div style="flex: 0 0 20%; text-align: center;">
                                <div style="color: #888; font-size: 0.75rem; text-align: center; ">Rimborso bossetti</div>
                                <div style="color: #fff; font-weight: bold;">
                                    ${calculateRimborsoCreditiSquadra(s)}
                                </div>
                            </div>

                            <div style="flex: 0 0 20%; text-align: right;">
                                <div style="color: #888; font-size: 0.75rem;">Punti</div>
                                <div class="rank-punti" style="line-height: 1; margin-top: 2px;">${s.totPunti}</div>
                            </div>
                        </div>

                        <table style="width: 100%; table-layout: fixed; border-collapse: collapse;">
                            ${[...s.partecipanti].sort((a, b) => {
                                const mA = getMortoByName(a.nome);
                                const mB = getMortoByName(b.nome);
                                return (mB?.punti || 0) - (mA?.punti || 0);
                            }).map(p => {
                                const morto = getMortoByName(p.nome);
                                const isDead = morto && morto.status === 'morto';
                                return `
                                    <tr class="${isDead ? 'dead-row' : ''}">
                                        <td class="col-nome" style="width: 40%; text-align: left;">
                                            <span style="margin-right: 5px;">${isDead ? '💀' : '😒'}</span>
                                            <span style="color: #eee;">${p.nome}</span>
                                        </td>
                                        <td style="width: 20%; text-align: center; font-size: 1rem; color: #aaa; font-family: monospace;">
                                            ${morto ? morto.prezzo : '?'} <small style="color: #555; text-align: center;">BS</small>
                                        </td>
                                        <td style="width: 20%; text-align: center; font-size: 1rem; color: #aaa; font-family: monospace;">
                                            ${morto ? morto.rimborso : '?'} <small style="color: #555; text-align: center;">BS</small>
                                        </td>
                                        <td class="col-punti" style="width: 20%; text-align: right; font-weight: bold;">
                                            ${morto && morto.punti > 0 ? '+' + morto.punti : '0'}
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </table>
                    </div>
                `;
            });

            // --- SEZIONE GESTIONE ADMIN ---
            if (isAuthorized) {
                // Configurazione Visibilità
                adminCont.innerHTML += `
                    <div class="card" style="border: 2px solid #44aaff;">
                        <h3 style="margin-top: 0; color: #44aaff;">🌐 Configurazione Visibilità</h3>
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="check-visibilita-mercato" 
                                ${db.config.mostra_mercato !== false ? 'checked' : ''} 
                                onchange="db.config.mostra_mercato = this.checked; render();"
                                style="width: 20px; height: 20px;">
                            <span style="font-size: 1.1rem; font-weight: bold;">Abilita Tab "⚙️ Gestione Squadra" per gli utenti</span>
                        </label>
                    </div>
                `;

                // Gestione Morituri
                adminCont.innerHTML += `
                    <div class="card" style="border: 2px solid var(--accent);">
                        <h3 style="margin-top: 0; color: var(--accent);">💀 Gestione Morituri</h3>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th style="width: 50%;">Nome</th>
                                    <th style="width: 10%;">Prezzo</th>
                                    <th style="width: 10%;">Punti</th>
                                    <th style="width: 10%;">Status</th>
                                    <th style="width: 10%;">Azione</th>
                                    <th style="width: 10%;">Rimborso</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${db.morituri.map((m, mIdx) => `
                                    <tr style="background: ${m.status === 'morto' ? '#1a0a0a' : ''};">
                                        <td><strong>${m.nome}</strong></td>
                                        <td><input type="number" value="${m.prezzo}" onchange="updateMortoPrezzo(${mIdx}, this.value)" style="width: 100%; padding: 4px; background: #111; border: 1px solid #444; color: white; box-sizing: border-box;"></td>
                                        <td><input type="number" value="${m.punti}" onchange="updateMortoPoints(${mIdx}, this.value)" style="width: 100%; padding: 4px; background: #111; border: 1px solid #444; color: white; box-sizing: border-box;"></td>
                                        <td style="text-align: center; cursor: pointer; user-select: none; font-size: 1.2rem; padding: 8px;" onclick="updateMortoStatus(${mIdx})" title="Clicca per cambiare status">${m.status === 'morto' ? '💀' : '😒'}</td>
                                        <td><button onclick="removeMorto(${mIdx})" style="width: 100%; padding: 4px; background: #8B0000; border: 1px solid #555; color: white; border-radius: 4px; cursor: pointer; font-weight: bold;">❌</button></td>
                                        <td><input type="number" value="${m.rimborso}" onchange="updateMortoRimborso(${mIdx}, this.value)" style="width: 100%; padding: 4px; background: #111; border: 1px solid #444; color: white; box-sizing: border-box;">
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div style="margin-top: 15px; padding: 12px; background: #0a0a0a; border-radius: 8px; display: flex; gap: 8px;">
                            <input type="text" id="new-morto-nome" list="lista-suggerimenti" placeholder="Cerca nome..." oninput="aggiornaPrezzoAutomatico(this.value, 'new-morto-prezzo')" style="flex: 1; padding: 6px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;" oninput="this.value = this.value.replace(/[^a-zA-Z0-9\s]/g, '').toUpperCase();">
                            <datalist id="lista-suggerimenti"></datalist>
                            <input type="number" id="new-morto-prezzo" placeholder="BS" value="0" style="width: 120px; padding: 6px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;">
                            <button onclick="addMorto()" style="padding: 6px 12px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer;">➕ Aggiungi</button>
                        </div>
                    </div>
                `;

                // Gestione Squadre
                adminCont.innerHTML += `
                    <div class="card" style="border: 2px solid var(--accent); margin-top: 30px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 style="margin: 0; color: var(--accent);">⚽ Gestione Squadre</h3>
                            <button onclick="addSquadra()" style="padding: 8px 15px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer;">➕ Nuova Squadra</button>
                        </div>
                        ${db.campionato.map((s, tIdx) => {
                            const totCrediti = calculateCreditiSquadra(s);
                            const residui = calculateCreditiResidui(s);
                            return `
                                <div style="margin-bottom: 25px; padding: 15px; background: #0a0a0a; border-radius: 8px;">
                                    <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                                        <input type="text" value="${s.nome_squadra}" onchange="db.campionato[${tIdx}].nome_squadra = this.value; render();" placeholder="Nome Squadra" style="flex: 1; padding: 6px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;">
                                        <input type="text" value="${s.proprietario}" onchange="db.campionato[${tIdx}].proprietario = this.value; render();" placeholder="Proprietario" style="flex: 0.6; padding: 6px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;">
                                        <span style="padding: 6px; color: ${residui < 0 ? '#ff4444' : '#44ff44'}; font-weight: bold;">Crediti residui: ${residui}</span>
                                        <button onclick="removeSquadra(${tIdx})"
                                                style="padding: 6px 12px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer;">🗑️
                                        </button>
                                        </div>
                                    <table class="admin-table" style="font-size: 0.85rem;">
                                        <thead>
                                            <tr>
                                                <th style="width: 50%;">Partecipante</th>
                                                <th style="width: 25%;">Crediti</th>
                                                <th style="width: 25%;">Azione</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${s.partecipanti.map((p, pIdx) => {
                                                const morto = getMortoByName(p.nome);
                                                return `
                                                    <tr ${morto && morto.status === 'morto' ? 'style="background: #1a0a0a;"' : ''}>
                                                        <td>${p.nome}</td>
                                                        <td>${morto ? morto.prezzo : '?'}</td>
                                                        <td><button onclick="db.campionato[${tIdx}].partecipanti.splice(${pIdx}, 1); render();" style="width: 100%; padding: 4px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; cursor: pointer;">❌</button></td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                    <div style="margin-top: 10px; display: flex; gap: 5px;">
                                        <select id="moriti-list-${tIdx}" style="flex: 1; padding: 6px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;">
                                            <option value="">-- Aggiungi partecipante --</option>
                                            ${db.morituri.filter(m => !s.partecipanti.find(p => p.nome === m.nome)).map(m => `<option value="${m.nome}">${m.nome}</option>`).join('')}
                                        </select>
                                        <button onclick="aggiungiADb(${tIdx}, 'moriti-list-${tIdx}')" style="padding: 6px 12px; background: ${s.partecipanti.length >= 13 ? '#333' : 'var(--accent)'}; border: none; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer;">➕
                                        </button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
            
            const datalist = document.getElementById('lista-suggerimenti');
            if (datalist) {
                datalist.innerHTML = catalogoMorituri.map(m => `<option value="${m.nome}">`).join('');
            }


            // Gestione Squadra
            const btnMercato = document.getElementById('btn-mercato');
            const userIdx = document.getElementById('user-team-select').value;
            const mercatoEditor = document.getElementById('mercato-editor');
            const morituriDisplay = document.getElementById('mercato-morituri-display');
            const budgetDisplay = document.getElementById('mercato-budget-display');
            const userSelect = document.getElementById('user-team-select');
            const headerMercato = document.querySelector('#view-mercato .card > div:first-child');
            const saveBtnMercato = document.querySelector('#view-mercato button[onclick*="saveToGitHub"]');

            if (db.config.mostra_mercato) {
                btnMercato.innerHTML = "⚙️ Gestione Squadra";

                if (headerMercato) headerMercato.style.display = 'flex';
                if (saveBtnMercato) saveBtnMercato.style.display = 'inline-block';

                // Popola la select se vuota (una sola volta)
                if (userSelect && userSelect.options.length <= 1) {
                    userSelect.innerHTML = '<option value="">-- Seleziona la tua squadra --</option>' + db.campionato.map((s, i) => `<option value="${i}">${s.nome_squadra} - ${s.proprietario}</option>`).join('');
                }

                if (userIdx !== "" && mercatoEditor) {
                    const s = db.campionato[userIdx];
                    const res = calculateCreditiResidui(s);

                    // 1. Aggiorna il numero e il budget accanto alla select
                    morituriDisplay.innerHTML = `<strong>Morituri: <span style="color: #44ff44">${s.partecipanti.length}</span>/${numeroMaxPartecipanti(s)}</strong>`;
                    budgetDisplay.innerHTML = `<strong>Crediti: <span style="color: #44ff44">${res} BS</span></strong>`;

                    // 2. Renderizza la tabella dei partecipanti
                    mercatoEditor.innerHTML = `
                        <table>
                            <thead>
                                <tr><th>Nome</th><th style="text-align:center;">Bossetti</th><th style="text-align:right;">Azione</th></tr>
                            </thead>
                            <tbody>
                                ${s.partecipanti.map((p, i) => {
                                    const m = getMortoByName(p.nome);
                                    return `
                                    <tr>
                                        <td>${p.nome}</td>
                                        <td style="text-align:center;">${m ? m.prezzo : 0} BS</td>
                                        <td style="text-align:right;">
                                            <button class="btn-del" 
                                            style="height: 32px; width: 48px; padding: 0; display: inline-flex; align-items: center; justify-content: center; line-height: 1;"
                                            onclick="db.campionato[${userIdx}].partecipanti.splice(${i},1);render();">❌</button>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                        
                        <div style="display:flex; gap:10px; margin-top:20px; background:#111; padding:15px; border-radius:8px; border: 1px solid #333;">
                            <input type="text" id="user-add-nome" list="lista-suggerimenti" placeholder="Cerca nel listino..." 
                                oninput="aggiornaPrezzoAutomatico(this.value, 'user-add-prezzo')"
                                style="flex:1;">
                            <input type="number" id="user-add-prezzo" placeholder="BS" readonly value="0" style="width: 120px; padding: 6px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;">
                            <button class="btn-add" onclick="aggiungiADb(${userIdx}, 'user-add-nome')" style="width:auto; padding:0 20px;">➕ Aggiungi</button>
                        </div>
                    `;
                } else {
                    // Pulisce se non è selezionato nulla
                    if(budgetDisplay) budgetDisplay.innerHTML = "";
                    if(mercatoEditor) mercatoEditor.innerHTML = '<p style="text-align:center; color:#666;">Seleziona la tua squadra per iniziare.</p>';
                }
            } else {
                btnMercato.innerHTML = "🔒 Mercato Chiuso";
                if (headerMercato) headerMercato.style.display = 'none';
                if (saveBtnMercato) saveBtnMercato.style.display = 'none';
                
                if (mercatoEditor) {
                    mercatoEditor.innerHTML = `
                        <div style="text-align: center; padding: 60px 20px; color: #555;">
                            <h2 style="color: #444; letter-spacing: 2px;">Non è possibile effettuare modifiche</h2>
                            <p>Il mercato di riparazione riaprirà dal 1° al 15 Agosto 2026 e dal 1° al 15 Dicembre 2026.</p>
                        </div>
                    `;
                }
            }
        }

        async function saveToGitHub() {
            // Chiediamo il codice segreto agli amici (il tuo Token)
            // Lo metteranno una volta sola, poi il browser lo ricorda
            const sel = document.getElementById('user-team-select');
            autore = sel.options[sel.selectedIndex].text || 'utente';

            if (autore == "-- Seleziona la tua squadra --") autore = "ADMIN";
            
            let token = localStorage.getItem('fantamorto_access_token');
            
            if (!token) {
                token = prompt("🔑 Inserisci il codice segreto per autorizzare il salvataggio:");
                if (token) localStorage.setItem('fantamorto_access_token', token);
                else return;
            }

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "⏳ Invio in corso...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_INFO.OWNER}/${REPO_INFO.REPO}/dispatches`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        event_type: "update_json",
                        client_payload: {
                            autore: autore,
                            db: JSON.stringify(db, null, 2)
                        }
                    })
                });

                if (response.ok) {
                    btn.innerText = "🚀 Richiesta inviata! Il sito si aggiornerà tra circa 30 secondi.";
                    btn.style.backgroundColor = "#28a745"; // Opzionale: diventa verde
                    
                    // Dopo 5 secondi lo facciamo tornare normale se vuoi
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.disabled = false;
                        btn.style.backgroundColor = ""; 
                    }, 5000);
                } else {
                    const err = await response.json();
                    if (response.status === 401 || response.status === 403) {
                        alert("❌ Accesso negato o Token scaduto.");
                        localStorage.removeItem('fantamorto_access_token'); // Rimuove il token sbagliato
                    } else {
                        const err = await response.json();
                        alert("❌ Errore: " + err.message);
                    }
                }
            } catch (e) {
                alert("❌ Errore di connessione.");
            }
        }

        // Avvio
        verifyAdmin().then(loadData);
    </script>
</body>

name: Save Team Data
on:
  repository_dispatch:
    types: [update_json]

concurrency:
  group: update-json-group
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Merge Data
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node -e "
            const fs = require('fs');
            const file = 'squadre.json';
            const payload = JSON.parse(process.env.PAYLOAD);
            
            try {
              let currentDb = JSON.parse(fs.readFileSync(file, 'utf8'));

              if (payload.tipo === 'FULL_DB') {
                // CASO ADMIN: Sovrascriviamo tutto il database
                currentDb = payload.db;
                console.log('Admin: Sovrascrittura database completa');
              } else {
                // CASO UTENTE: Merge della singola squadra
                const nuovaSquadra = payload.squadra;
                if (!nuovaSquadra || !nuovaSquadra.nome_squadra) throw new Error('Dati squadra corrotti');

                const index = currentDb.campionato.findIndex(s => s.nome_squadra === nuovaSquadra.nome_squadra);
                if (index !== -1) {
                  currentDb.campionato[index] = nuovaSquadra;
                  console.log('Update squadra: ' + nuovaSquadra.nome_squadra);
                } else {
                  currentDb.campionato.push(nuovaSquadra);
                  console.log('New squadra: ' + nuovaSquadra.nome_squadra);
                }
              }

              fs.writeFileSync(file, JSON.stringify(currentDb, null, 2));
            } catch (err) {
              console.error('Errore durante il salvataggio:', err.message);
              process.exit(1);
            }
          "
      - name: Push delle modifiche
        run: |
          git config user.name "Fantamorto Bot"
          git config user.email "actions@github.com"
          git add squadre.json
          git commit -m "Update: ${{ github.event.client_payload.autore }}" || exit 0
          git pull --rebase origin main
          git push origin main
name: Fantamorto Bot
on:
  schedule:
    - cron: '0 * * * *' # Controlla ogni ora (minuto 0)
  workflow_dispatch:   # Ti permette di avviarlo a mano per testare

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Serve per permettere al bot di modificare squadra.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
      - name: Commit Changes
        run: |
          git config --global user.name 'FantamortoBot'
          git config --global user.email 'actions@github.com'
          git add squadra.json
          git commit -m "Aggiornamento status morti" || exit 0
          git push

name: Fantamorto Bot Cache

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codice
        uses: actions/checkout@v4

      - name: Ripristina Cache ID
        uses: actions/cache@v3
        with:
          path: last_id.txt
          key: fantamorto-last-id-${{ github.run_id }}
          restore-keys: |
            telegram-last-id-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Esegui Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node telegram_scraper.js

      - name: Salva Nuovo ID in Cache
        if: always()
        uses: actions/cache/save@v3
        with:
          path: last_id.txt
          key: fantamorto-last-id-${{ github.run_id }}